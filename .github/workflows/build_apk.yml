name: Build & Auto Release Android APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # -----------------------------
      # Setup Java
      # -----------------------------
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant permission
        run: chmod +x gradlew

      # -----------------------------
      # AUTO GENERATE KEYSTORE
      # -----------------------------
      - name: Generate Keystore Automatically
        run: |
          keytool -genkeypair -v \
            -keystore keystore.jks \
            -storepass android123 \
            -alias bnxit \
            -keypass android123 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=BNXIT, OU=Dev, O=BNXIT, L=Dhaka, S=Dhaka, C=BD"

      # -----------------------------
      # Build Release APK (SIGNED)
      # -----------------------------
      - name: Build Release APK
        run: ./gradlew clean assembleRelease
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: android123
          KEY_ALIAS: bnxit
          KEY_PASSWORD: android123

      # -----------------------------
      # Locate APK safely
      # -----------------------------
      - name: Collect APK
        run: |
          mkdir -p release
          find app/build/outputs/apk -name "*.apk" -exec cp {} release/app-release.apk \;

      # -----------------------------
      # Upload artifact (optional)
      # -----------------------------
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: release/

      # -----------------------------
      # Create GitHub Release
      # -----------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          files: release/app-release.apk
          body: |
            🚀 Auto-generated Android APK Release

            ✔ Signed automatically in CI  
            ✔ No manual keystore required  
            ✔ Ready for installation (TV / Android Box)

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}